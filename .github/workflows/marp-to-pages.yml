name: marp-to-pages
concurrency: marp-to-pages
on:
  push:
    branches: [ main ]
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - closed
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Ensure build dir exists
        run: mkdir -p build
      - name: Copy images directory (if exists)
        run: if [[ -d img ]]; then cp -R img build/img; fi
      - name: Marp Build HTML (all markdown files)
        uses: docker://marpteam/marp-cli:v3.0.2
        with:
          args: -I . --html -o build/
        env:
          MARP_USER: root:root
      - name: Rename README to index
        run: mv build/README.html build/index.html
      - name: Marp Build PDF (all markdown files)
        uses: docker://marpteam/marp-cli:v3.0.2
        with:
          args: -I . --html --allow-local-files --pdf -o build/
        env:
          MARP_USER: root:root
      - name: Marp Build PPTX (all markdown files)
        uses: docker://marpteam/marp-cli:v3.0.2
        with:
          args: -I . --html --allow-local-files --pptx -o build/
        env:
          MARP_USER: root:root
      - name: Deploy preview
        if: ${{ github.event_name == 'pull_request' }}
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: ./build/
          preview-branch: gh-pages
          umbrella-dir: pr-preview
      - name: Deploy production
        if: ${{ github.event_name == 'push' }}
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: ./build/
          clean-exclude: pr-preview/
